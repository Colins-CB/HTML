<!DOCTYPE html>
<html lang="en">
    <form>
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>User Registration Form</title>
    <style>
        form{
            width: 100%;
            height: 100%;
            align-content: center;
            background-color: #f2f2f2;
            font-family: Arial, Helvetica, sans-serif;
            text-decoration: aliceblue;
        }
    </style>
</head>
<body>
    <h1>FORM</h1>
    <h3>Personal Information</h3>
    <label for="name">Name:</label>
    <input type="text" id="name" name="name" value="Enter your name"><br><br>
    <label for="email">Email:</label>
    <input type="email" id="email" name="email" value=".... your email"><br><br>
    <label for="phone">Phone Number:</label>
    <input type="tel" id="phone" name="phone" value="Enter your phone number"><br><br>
    <label for="gender">Gender:</label>
    <input type="radio" id="Male" name="gender" value="male">
    <label for="Male">Male</label>
    <input type="radio" id="Female" name="gender" value="female">
    <label for="Female">Female</label><br><br>
    <label for="skills">Skills:</label>
    <input type="checkbox" id="skills" name="skills" value="HTML">
    <label for="skills">HTML</label>
    <input type="checkbox" id="skills" name="skills" value="CSS">
    <label for="skills">CSS</label>
    <input type="checkbox" id="skills" name="skills" value="JavaScript">
    <label for="skills">JavaScript</label><br><br>
    <label for="country">Country:</label>
        <select name="country" id="country">
            <option value="Egypt">Egypt</option>
            <option value="Saudi Arabia">Saudi Arabia</option>
            <option value="United Arab Emirates">United Arab Emirates</option>
            <option value="Kuwait">Kuwait</option>
            <option value="Kenya">Kenya</option>
            <option value="Qatar">Qatar</option>
        </select> <br><br>
        <label for="date of birth">Date of Birth:</label>
        <input type="date" id="date of birth" name="date of birth"><br><br>
        <label for="message">About You:</label><br>
        <textarea id="message" name="message" rows="4" cols="50"></textarea><br><br>
        <label for="resume">Resume</label>
        <input type="file" id="resume" name="resume"><br><br>
        <input type="submit" value="Submit">
        <input type="reset" value="Reset"><br><br>
    <p>The company connect the individauls with the customers<br> 
        according to there skills.
    </p> 
</body>
    </form>
</html>
